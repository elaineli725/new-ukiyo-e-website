        <h1>关于</h1>
        <p>这是一个以浮世绘为主题的个人小站。</p>
        <p>我想在这里收集那些让我停下来的图像：美人的侧影，演员的姿态，风景中的潮声与月色，以及江户城市生活中短暂、轻盈、近于幻觉的片刻。</p>
        <p>浮世绘并不只是过去留下的图像。它更像一种仍在流动的观看方式：关于四季，关于欲望，关于人如何在短暂之中追求美。</p>
        <p>所以，这里并不是一座完整的资料库，而更像一本缓慢展开的手记。它记录我如何透过这些版画，进入一个既热闹又忧伤的浮世。</p>
      </div>
