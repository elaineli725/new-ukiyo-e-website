      function useReveal() {
        const ref = useRef(null);
        useEffect(() => {
          const node = ref.current;
          if (!node) return;
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  node.classList.add('visible');
                  observer.unobserve(node);
                }
              });
            },
            { threshold: 0.18 }
          );
          observer.observe(node);
          return () => observer.disconnect();
        }, []);
        return ref;
      }

      function Reveal({ className = '', children }) {
        const ref = useReveal();
        return (
          <div ref={ref} className={`reveal ${className}`}>
            {children}
          </div>
        );
      }


      function ArtworkVisual({ image, title, palette, ratio = 'portrait', label = '作品图像占位' }) {
        const [hasImage, setHasImage] = useState(Boolean(image));

        useEffect(() => {
          setHasImage(Boolean(image));
        }, [image]);

        return (
          <div className={`art-image-shell art-image-${ratio} bg-gradient-to-br ${palette}`}>
            {hasImage ? (
              <img
                src={image}
                alt={title}
                loading="lazy"
                className="art-image"
                onError={() => setHasImage(false)}
              />
            ) : null}
            <div className={`art-image-fallback ${hasImage ? 'is-hidden' : ''}`} aria-hidden={hasImage}>
              <span>{label}</span>
            </div>
          </div>
        );
      }

          () => timelineData.map((phase) => selectedWorks.filter((work) => work.phase === phase.title)),

          window.addEventListener('hashchange', onHashChange);
          return () => window.removeEventListener('hashchange', onHashChange);
        }, []);

                      <p className="text-xs uppercase tracking-[0.3em] text-mist/60">Curatorial Note</p>
                      <p className="mt-4 text-sm leading-7 text-moon/68">
                        {activePhase === 0 && '系列在秋天开始刊行，最初几幅作品已经确立了整套《月百姿》的夜色基调：月不仅照亮人物，也制造距离、静默与情绪的停顿。'}
                        {activePhase === 1 && '随着系列展开，历史、传说与抒情场景开始互相映照，月成为连接不同题材的内部结构，而非外在装饰。'}
                        {activePhase === 2 && '人物群像渐渐丰盛之后，观看的重点不再只是“谁出现了”，而是“月如何让这些人物被放进同一种冷静而诗性的时空中”。'}
                        {activePhase === 3 && '晚期的作品收束了戏剧性，让整套系列显出成熟与终章感。月色愈发沉静，也让《月百姿》最终成为一个完整而连贯的夜间世界。'}
                      </p>
                    </div>
                    <a
                      href="#selected"
                      className="inline-flex items-center border border-gold/30 px-5 py-3 text-sm tracking-[0.18em] text-moon transition hover:border-gold/50 hover:bg-white/[0.04]"
                    >
                      查看更多
                    </a>
                  </div>

                  <div className="grid gap-5 md:grid-cols-3">
                    {activeWorks.map((work) => (
                      <article
                        key={work.title}
                        className="group overflow-hidden rounded-[1.5rem] border border-paper/10 bg-white/[0.04] transition duration-500 hover:-translate-y-1 hover:border-gold/35 hover:bg-white/[0.06]"
                      >
                        <div className="p-4">
                          <ArtworkVisual image={work.image} title={work.title} palette={work.palette} ratio="portrait" label="Image Placeholder" />
                        </div>
                        <div className="space-y-3 p-5">
                          <div className="flex items-center justify-between gap-3 text-xs uppercase tracking-[0.28em] text-mist/70">
                            <span>{work.year}</span>
                            <span>{work.phase}</span>
                          </div>
                          <h3 className="font-serif text-xl text-moon transition group-hover:text-moon/95">{work.title}</h3>
                          <p className="text-sm leading-7 text-moon/66">{work.desc}</p>
                        </div>
                      </article>
                    ))}
                  </div>
                </Reveal>
              </section>

              <section id="selected" className="px-4 py-20 md:px-6 md:py-24">
                <Reveal className="mx-auto w-full max-w-6xl">
                  <div className="mb-12 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                    <div>
                      <p className="text-xs uppercase tracking-[0.35em] text-gold/90">Selected Works</p>
                      <h2 className="mt-4 font-serif text-3xl md:text-5xl">12 幅精选作品</h2>
                    </div>
                    <p className="max-w-xl text-sm leading-7 text-moon/68 md:text-base">
                      首批卡片已接入 `images/moon100/` 中的本地图像；未命中的条目仍保留占位块，方便继续补充。
                    </p>
                  </div>

                  <div className="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
                    {selectedWorks.map((work, index) => (
                      <article
                        key={work.title}
                        className={`group paper-texture relative overflow-hidden rounded-[1.75rem] border border-paper/10 bg-white/[0.035] transition duration-500 hover:-translate-y-1 hover:border-gold/35 hover:shadow-moon ${
                          index % 5 === 0 ? 'xl:translate-y-8' : ''
                        } ${index % 5 === 3 ? 'xl:-translate-y-6' : ''}`}
                      >
                        <div className="p-5">
                          <ArtworkVisual image={work.image} title={work.title} palette={work.palette} ratio="portrait" label="作品图像占位" />
                        </div>
                        <div className="space-y-3 p-6">
                          <div className="flex flex-wrap items-center gap-2 text-xs uppercase tracking-[0.28em] text-mist/70">
                            <span>{work.year}</span>
                            <span className="text-moon/20">•</span>
                            <span>{work.phase}</span>
                          </div>
                          <h3 className="font-serif text-2xl text-moon">{work.title}</h3>
                          <p className="text-sm leading-7 text-moon/68">{work.desc}</p>
                        </div>
                      </article>
                    ))}
                  </div>
                </Reveal>
              </section>

              <section id="why-moon" className="px-4 pb-20 md:px-6 md:pb-24">
                <Reveal className="mx-auto grid w-full max-w-6xl gap-8 rounded-[2rem] border border-paper/10 bg-white/[0.03] p-8 shadow-moon paper-texture lg:grid-cols-[0.9fr_1.3fr] md:p-12">
                  <div className="flex flex-col justify-between gap-8">
                    <div>
                      <p className="text-xs uppercase tracking-[0.35em] text-gold/90">Why the Moon</p>
                      <h2 className="mt-4 font-serif text-3xl leading-tight md:text-5xl">月不是背景，而是系列的精神结构</h2>
                    </div>
                    <div className="flex items-center gap-5">
                      <div className="flex h-24 w-24 items-center justify-center rounded-full border border-moon/15 bg-moon/8 shadow-[0_0_40px_rgba(243,241,235,0.08)]">
                        <div className="h-14 w-14 rounded-full border border-gold/40 bg-gradient-to-br from-moon/90 via-moon/35 to-transparent" />
                      </div>
                      <p className="max-w-xs text-sm leading-7 text-moon/62">
                        月相、留白与冷色层次共同构成观看节奏，像展厅中一盏不喧哗的引导光。
                      </p>
                    </div>
                  </div>
                  <div className="space-y-6 text-sm leading-8 text-moon/72 md:text-base">
                    <p>
                      在《月百姿》中，月并不只是夜景中的点缀。它像一条隐形的结构线，把彼此分散的历史人物、传说角色、女性形象与幽灵时刻组织成同一部作品。
                    </p>
                    <p>
                      月的作用也不在于制造戏剧高潮，而在于创造距离。它让人物与观者之间保留出一层不可完全抵达的空白，让每个场景都带着轻微的寒意、克制与沉思。
                    </p>
                    <p>
                      正因如此，《月百姿》值得被当作一场数字展览来观看：不是快速浏览一百幅画，而是在同一轮月光之下，看见不同故事如何被缓慢连接，如何在旧纸、木版与时间的缝隙里重新发出微光。
                    </p>
                  </div>
                </Reveal>
              </section>
            </main>

            <footer className="border-t border-paper/10 px-4 py-8 md:px-6">
              <div className="mx-auto flex w-full max-w-6xl flex-col gap-5 md:flex-row md:items-center md:justify-between">
                <div>
                  <p className="font-serif text-2xl text-moon">月百姿</p>
                  <p className="mt-2 text-sm text-moon/60">
                    A digital exhibition on Tsukioka Yoshitoshi’s moonlit world.
                  </p>
                </div>
                <div className="flex flex-wrap items-center gap-4 text-sm text-moon/60">
                  <span>Future credits reserved</span>
                  <a href="#top" className="border border-moon/15 px-4 py-2 transition hover:border-gold/40 hover:text-moon">
                    Back to top
                  </a>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
