<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>月百姿｜月冈芳年笔下的月夜人间</title>
    <meta name="description" content="《月百姿》数字策展专题网站：以时间线为核心，呈现月冈芳年 One Hundred Aspects of the Moon。" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#0a0d14',
              moon: '#ece8de',
              mist: '#a5b1c2',
              haze: '#4e5d76',
              gold: '#9b8460',
              crimson: '#6d2834',
            },
            fontFamily: {
              serif: ['"Noto Serif SC"', '"Songti SC"', 'serif'],
              sans: ['"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
            },
            boxShadow: {
              moon: '0 18px 50px rgba(8,12,20,0.45)',
            },
          },
        },
      };
    </script>
    <style>
      html { scroll-behavior: smooth; }
      body {
        background: radial-gradient(circle at 10% 0%, rgba(236, 232, 222, 0.08), transparent 35%),
          linear-gradient(180deg, #0a0d14 0%, #0f1420 50%, #0a0d14 100%);
      }
      .paper::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0.12;
        background-image: radial-gradient(circle at 20% 20%, rgba(236,232,222,.45) 0 1px, transparent 2px),
          radial-gradient(circle at 80% 70%, rgba(165,177,194,.3) 0 1px, transparent 2px);
        background-size: 3px 3px, 4px 4px;
      }
      .reveal { opacity: 0; transform: translateY(20px); transition: all .9s ease; }
      .reveal.visible { opacity: 1; transform: translateY(0); }
      .timeline-track { background: linear-gradient(90deg, rgba(165,177,194,.2), rgba(236,232,222,.5), rgba(165,177,194,.2)); }
      @media (max-width: 767px) {
        .timeline-track { background: linear-gradient(180deg, rgba(165,177,194,.2), rgba(236,232,222,.5), rgba(165,177,194,.2)); }
      }
    </style>
  </head>
  <body class="text-moon font-sans">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const timelineData = [
        { year: '1885', title: '初刊与开场', desc: '系列在秋天开始刊行，确立月下人物的整体基调。', intro: '最初几幅作品已经显出《月百姿》的核心气质：月色、停顿、人物与夜的距离。' },
        { year: '1886', title: '系列展开', desc: '题材逐渐丰富，月下人物开始形成群像。', intro: '这一阶段里，历史、传说与抒情场景逐渐并置，系列的观看方式开始变得更加多层。' },
        { year: '1887–1888', title: '人物群像渐丰', desc: '历史、女性、传说与诗意场景持续扩展。', intro: '《月百姿》逐渐不只是一个主题系列，而更像一座在月夜中展开的人物剧场。' },
        { year: '1889–1892', title: '晚期成熟与完成', desc: '系列在芳年晚年走向成熟，并最终完成。', intro: '晚期阶段的作品更显沉静、凝练，也让整套系列拥有了完整的终章感。' },
      ];

      const worksData = [
        { id: 'moon-1', title: '月下武者', year: '1885', phase: '1885', desc: '月光压低了战意，只留下将要出声前的沉默。', image: '' },
        { id: 'moon-2', title: '桥上夜行', year: '1885', phase: '1885', desc: '人物在桥影中前行，月色像一层轻薄的幕。', image: '' },
        { id: 'moon-3', title: '秋窗读诗', year: '1885', phase: '1885', desc: '室内灯火与窗外月色形成细微的冷暖对照。', image: '' },
        { id: 'moon-4', title: '夜雨访客', year: '1886', phase: '1886', desc: '雨声之外，月被云遮住，人物神情更加内敛。', image: '' },
        { id: 'moon-5', title: '庭前听笛', year: '1886', phase: '1886', desc: '笛声未见，只有月下姿态暗示了旋律。', image: '' },
        { id: 'moon-6', title: '舟中人影', year: '1886', phase: '1886', desc: '水面与月色共同拉长了人物的孤独感。', image: '' },
        { id: 'moon-7', title: '古井幽光', year: '1887', phase: '1887–1888', desc: '井沿与月轮构成了紧张而安静的几何关系。', image: '' },
        { id: 'moon-8', title: '雪夜归人', year: '1887', phase: '1887–1888', desc: '雪地吸收了声音，月色让脚步变得更轻。', image: '' },
        { id: 'moon-9', title: '凭栏远望', year: '1888', phase: '1887–1888', desc: '人物未动，视线却把空间推向远处。', image: '' },
        { id: 'moon-10', title: '晚钟之后', year: '1889', phase: '1889–1892', desc: '钟声散去，画面进入近乎静止的夜色。', image: '' },
        { id: 'moon-11', title: '潮声与月', year: '1890', phase: '1889–1892', desc: '海与月交叠，人物成为时间的见证者。', image: '' },
        { id: 'moon-12', title: '终章月影', year: '1892', phase: '1889–1892', desc: '系列末段更趋凝练，像长卷缓慢收束。', image: '' },
      ];

      const navItems = [
        ['首页', 'top'], ['关于《月百姿》', 'about'], ['时间线', 'timeline'], ['阶段展开', 'phase-detail'], ['精选作品', 'selected'], ['为什么是月', 'why-moon']
      ];

      function App() {
        const [activePhase, setActivePhase] = useState(0);
        const [menuOpen, setMenuOpen] = useState(false);
        const [uploads, setUploads] = useState([]);
        const [route, setRoute] = useState(window.location.hash || '#top');

        useEffect(() => {
          const onHash = () => setRoute(window.location.hash || '#top');
          window.addEventListener('hashchange', onHash);
          return () => window.removeEventListener('hashchange', onHash);
        }, []);

        useEffect(() => {
          const io = new IntersectionObserver((entries) => {
            entries.forEach((e) => e.isIntersecting && e.target.classList.add('visible'));
          }, { threshold: 0.12 });
          document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
          return () => io.disconnect();
        }, [route]);

        const mergedWorks = useMemo(() => worksData.map((w, i) => ({ ...w, image: uploads[i] || w.image })), [uploads]);
        const activePhaseData = timelineData[activePhase];
        const phaseWorks = mergedWorks.filter((w) => w.phase === activePhaseData.year).slice(0, 3);

        const handleUpload = (e) => {
          const files = Array.from(e.target.files || []).slice(0, 100);
          setUploads(files.map((file) => URL.createObjectURL(file)));
        };

        if (route.startsWith('#/work/')) {
          const id = route.replace('#/work/', '');
          const work = mergedWorks.find((w) => w.id === id);
          return <WorkDetail work={work} />;
        }

        return (
          <div id="top" className="min-h-screen">
            <header className="fixed top-0 z-40 w-full border-b border-moon/10 bg-ink/85 backdrop-blur">
              <div className="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
                <a href="#top" className="font-serif text-lg tracking-[.2em]">月百姿</a>
                <button className="md:hidden text-sm border border-moon/20 px-3 py-1" onClick={() => setMenuOpen(!menuOpen)}>菜单</button>
                <nav className="hidden md:flex gap-5 text-sm text-mist">
                  {navItems.map(([label, id]) => <a key={id} href={`#${id}`} className="hover:text-moon transition">{label}</a>)}
                </nav>
              </div>
              {menuOpen && <nav className="md:hidden px-4 pb-4 flex flex-col gap-2 text-sm text-mist">{navItems.map(([label, id]) => <a key={id} href={`#${id}`} onClick={() => setMenuOpen(false)}>{label}</a>)}</nav>}
            </header>

            <main className="pt-20">
              <section className="reveal relative min-h-[90vh] flex items-center">
                <div className="mx-auto max-w-6xl px-4 py-20">
                  <p className="text-sm tracking-[.3em] text-mist">One Hundred Aspects of the Moon</p>
                  <h1 className="mt-5 font-serif text-6xl md:text-8xl">月百姿</h1>
                  <p className="mt-4 text-2xl font-serif">月冈芳年笔下的月夜人间</p>
                  <p className="mt-8 max-w-2xl leading-8 text-mist">一百幅画，一百次月光落下的瞬间。<br/>这不是静止的全集，<br/>而是一部在岁月中逐渐展开的月夜长卷。</p>
                  <div className="mt-10 flex flex-wrap gap-4">
                    <a href="#timeline" className="border border-gold/70 px-6 py-3 text-sm hover:bg-gold/10">进入时间线</a>
                    <a href="#selected" className="border border-moon/25 px-6 py-3 text-sm hover:bg-moon/5">浏览精选</a>
                  </div>
                </div>
              </section>

              <section id="about" className="reveal mx-auto max-w-6xl px-4 py-20">
                <div className="grid gap-8 md:grid-cols-2 rounded-2xl border border-moon/15 bg-haze/10 p-8 paper relative overflow-hidden">
                  <div><p className="text-mist text-sm tracking-[.2em]">ABOUT</p><h2 className="mt-3 font-serif text-3xl">一组以月为线索展开的夜之剧场</h2></div>
                  <div className="space-y-4 text-mist leading-8 text-sm md:text-base">
                    <p>《月百姿》是月冈芳年晚年的代表系列，共100幅，始于1885年秋，至1892年完成。它以“月”为线索，把历史人物、传说角色、女性形象与幽灵时刻编织成连续的观看路径。</p>
                    <p>重要之处不在叙事繁复，而在节奏克制：月光照亮的不只是人物，也照亮停顿、距离与情绪转折。</p>
                    <p>今天重看《月百姿》，仍能感到它的当代性：图像可以在安静中组织记忆，并让时间成为观看本身。</p>
                  </div>
                </div>
              </section>

              <section id="timeline" className="reveal mx-auto max-w-6xl px-4 py-20">
                <h2 className="font-serif text-4xl">时间线（核心）</h2>
                <p className="mt-3 text-mist">以刊行阶段进入《月百姿》，像走过被月光照亮的导览路径。</p>
                <div className="relative mt-10">
                  <div className="timeline-track absolute left-0 right-0 top-5 h-px hidden md:block" />
                  <div className="timeline-track absolute top-0 bottom-0 left-4 w-px md:hidden" />
                  <div className="grid gap-4 md:grid-cols-4">
                    {timelineData.map((item, idx) => (
                      <button key={item.year} onClick={() => setActivePhase(idx)} className={`text-left rounded-xl border p-4 transition ${activePhase===idx?'border-gold bg-gold/10':'border-moon/15 bg-haze/10 hover:border-moon/35'} md:pt-8 relative`}>
                        <span className={`absolute md:top-3 md:left-4 top-5 -left-[1.1rem] h-3 w-3 rounded-full border ${activePhase===idx?'bg-gold border-gold':'bg-ink border-moon/50'}`}></span>
                        <p className="text-xs tracking-[.2em] text-mist">{item.year}</p>
                        <h3 className="mt-2 font-serif text-xl">{item.title}</h3>
                        <p className="mt-2 text-sm text-mist">{item.desc}</p>
                        <div className="mt-3 h-20 rounded border border-moon/10 bg-gradient-to-br from-haze/30 to-ink/40"></div>
                      </button>
                    ))}
                  </div>
                </div>
              </section>

              <section id="phase-detail" className="reveal mx-auto max-w-6xl px-4 py-20">
                <div className="rounded-2xl border border-moon/15 bg-ink/50 p-8">
                  <h3 className="font-serif text-3xl">{activePhaseData.year}｜{activePhaseData.title}</h3>
                  <p className="mt-4 max-w-3xl text-mist leading-8">{activePhaseData.intro}</p>
                  <div className="mt-8 grid gap-4 md:grid-cols-3">
                    {phaseWorks.map((work) => <WorkCard key={work.id} work={work} small />)}
                  </div>
                  <a href="#selected" className="mt-8 inline-block border border-moon/25 px-5 py-2 text-sm hover:bg-moon/5">查看更多</a>
                </div>
              </section>

              <section id="selected" className="reveal mx-auto max-w-6xl px-4 py-20">
                <div className="flex items-end justify-between gap-4 flex-wrap">
                  <div><h2 className="font-serif text-4xl">精选作品（12）</h2><p className="mt-2 text-mist">每张卡片可进入独立详情页，后续可替换真实图像与文本。</p></div>
                  <label className="text-sm border border-moon/20 px-4 py-2 cursor-pointer hover:bg-moon/5">上传作品图（最多100张）
                    <input type="file" accept="image/*" multiple className="hidden" onChange={handleUpload} />
                  </label>
                </div>
                <p className="mt-3 text-xs text-mist">已加载：{uploads.length}/100（会按顺序覆盖卡片占位图）</p>
                <div className="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
                  {mergedWorks.map((work) => <WorkCard key={work.id} work={work} />)}
                </div>
              </section>

              <section id="why-moon" className="reveal mx-auto max-w-4xl px-4 py-24">
                <div className="rounded-2xl border border-moon/15 bg-haze/10 p-8 md:p-12">
                  <p className="text-mist tracking-[.18em] text-xs">WHY THE MOON</p>
                  <h2 className="mt-3 font-serif text-4xl">为什么是月</h2>
                  <div className="mt-8 space-y-6 leading-8 text-mist">
                    <p>在《月百姿》中，月并不是背景装饰，而是精神结构。它让每个人物都处在同一片冷光之下，彼此不同时代，却能被同一种观看方式连接。</p>
                    <p>月色制造了距离，也制造了诗意。它让历史事件退后半步，让情绪慢下来，让观者进入一种更安静、更细密的阅读。</p>
                    <p>因此，这一百幅并不是并列的“作品清单”，而是一条在时间中缓慢展开的夜路。</p>
                  </div>
                </div>
              </section>
            </main>

            <footer className="border-t border-moon/10 py-10 text-center text-sm text-mist">
              <p className="font-serif text-moon">月百姿</p>
              <p className="mt-2">A digital exhibition on Tsukioka Yoshitoshi's moonlit world.</p>
              <a href="#top" className="mt-4 inline-block text-moon hover:text-gold">Back to top ↑</a>
              <p className="mt-3 text-xs opacity-70">Future credits reserved.</p>
            </footer>
          </div>
        );
      }

      function WorkCard({ work, small = false }) {
        return (
          <article className="group rounded-xl border border-moon/15 bg-haze/10 overflow-hidden shadow-moon">
            <div className="relative h-44 overflow-hidden">
              {work.image ? (
                <img src={work.image} alt={work.title} className="h-full w-full object-cover transition duration-500 group-hover:scale-105" />
              ) : (
                <div className="h-full w-full bg-gradient-to-br from-haze/40 via-ink/40 to-crimson/20 transition duration-500 group-hover:scale-105" />
              )}
            </div>
            <div className="p-4">
              <p className="text-xs tracking-[.14em] text-mist">{work.year} · {work.phase}</p>
              <h4 className="mt-2 font-serif text-xl">{work.title}</h4>
              <p className="mt-2 text-sm text-mist">{work.desc}</p>
              {!small && <a href={`#/work/${work.id}`} className="mt-4 inline-block border border-gold/60 px-4 py-2 text-xs hover:bg-gold/10">进入详情页</a>}
            </div>
          </article>
        );
      }

      function WorkDetail({ work }) {
        if (!work) {
          return <div className="min-h-screen flex items-center justify-center"><a href="#top" className="border px-5 py-3">返回首页</a></div>;
        }
        return (
          <div className="min-h-screen bg-ink text-moon px-4 py-12">
            <div className="mx-auto max-w-5xl">
              <a href="#selected" className="text-sm text-mist hover:text-moon">← 返回精选作品</a>
              <div className="mt-6 grid gap-8 md:grid-cols-2">
                <div className="rounded-2xl border border-moon/15 overflow-hidden h-[460px] bg-gradient-to-br from-haze/30 to-ink/70">
                  {work.image && <img src={work.image} alt={work.title} className="w-full h-full object-cover" />}
                </div>
                <div>
                  <p className="text-sm tracking-[.2em] text-mist">WORK DETAIL</p>
                  <h1 className="mt-3 font-serif text-4xl">{work.title}</h1>
                  <p className="mt-3 text-mist">年代：{work.year}</p>
                  <p className="text-mist">阶段：{work.phase}</p>
                  <p className="mt-6 leading-8 text-mist">{work.desc} 当前为第一版占位详情页，后续可在数据数组中补充真实作品名称、尺寸、馆藏、释文与策展注释。</p>
                  <button className="mt-8 border border-gold/60 px-5 py-2 text-sm hover:bg-gold/10" onClick={() => alert('后续可接入真实详情数据或多媒体注释。')}>查看扩展注释</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
